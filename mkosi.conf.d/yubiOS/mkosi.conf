# SPDX-License-Identifier: LGPL-2.1-or-later
# yubiOS profile — FIDO2-first immutable OS, YubiKey as root of trust
#
# Usage:
#   mkosi --profile yubiOS build
#
# Prerequisites:
#   - YubiKey 5 series with PIV slot 9c configured for Secure Boot signing
#   - PKCS11 URI exported: ykman piv info (note slot 9c certificate)
#   - DER cert exported: ykman piv certificates export 9c yubiOS-sb.cer
#   - PEM cert derived:  openssl x509 -inform der -in yubiOS-sb.cer -out yubiOS-sb.pem
#
# The private key never leaves the YubiKey — sbsign calls pkcs11-provider
# via OpenSSL to sign through the CCID interface.

[Match]
Profile=yubiOS

[Host]
# openssl-pkcs11 or pkcs11-provider must be installed on the build host.
# The YubiKey must be inserted during the signing phase.
Packages=
        opensc
        pcsc-lite

[Content]
Bootloader=systemd-boot
UnifiedKernelImages=signed

# Secure Boot via YubiKey PIV slot 9c (CCID)
# Set YUBIOS_PIV_CERT to the path of your exported certificate PEM.
# Set YUBIOS_PIV_URI to your PKCS11 token URI, e.g.:
#   pkcs11:manufacturer=piv_II;id=%02;type=private
# Override on CLI: --secure-boot-key=<uri> --secure-boot-key-source=provider:pkcs11
SecureBoot=yes
SecureBootKeySource=provider:pkcs11
SecureBootKey=%E/../mkosi.secure-boot.pkcs11-uri
SecureBootCertificate=%E/../mkosi.secure-boot.pem
SecureBootSignTool=systemd-sbsign
SecureBootAutoEnroll=no

# dm-verity + composefs
Verity=signed
VerityKeySource=provider:pkcs11
VerityKey=%E/../mkosi.verity.pkcs11-uri
VerityCertificate=%E/../mkosi.verity.pem

# Kernel command line
KernelCommandLine=
        quiet
        ro
        rd.luks.options=fido2-device=auto,discard
        systemd.machine_id=
        lockdown=confidentiality

# YubiKey / FIDO2 / PAM stack
Packages=
        # FIDO2
        libfido2
        # PAM U2F (pam_u2f.so) — must be >= 1.3.1 (CVE-2025-23013)
        pam-u2f
        # PIV / CCID for Secure Boot signing
        opensc
        pcsc-lite
        pcsc-lite-libs
        # YubiKey management
        yubikey-manager
        python3-yubikey-manager
        # systemd with FIDO2 cryptenroll support
        systemd
        # SSH resident keys support
        openssh
        openssh-server
        # PKCS11 OpenSSL provider (build-host + target)
        openssl-pkcs11

RemoveFiles=
        # No TPM paths needed
        /usr/lib/systemd/system/tpm2.target
        /usr/lib/udev/rules.d/60-tpm-udev.rules
        # Shim is not used — pure YubiKey PIV enrollment
        /usr/lib/shim/

PostInstallationScripts=
        mkosi.scripts/10-yubiOS-pam-u2f.sh
